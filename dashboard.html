<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowbit Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#070707;
color:white;
overflow-x:hidden;
}

/* TOPBAR */

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
background:linear-gradient(90deg,#ff1f1f,#680000);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
z-index:999;
box-shadow:0 0 20px rgba(255,0,0,.4);
}

.left-top{
display:flex;
align-items:center;
gap:15px;
}

.menu-btn{
font-size:34px;
cursor:pointer;
}

.logo{
font-size:30px;
font-weight:bold;
}

.logout-btn{
padding:10px 18px;
border:none;
border-radius:12px;
background:#ffffff20;
color:white;
cursor:pointer;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-300px;
width:280px;
height:100%;
background:#111;
padding:90px 20px;
transition:.3s;
z-index:1000;
}

.sidebar.active{
left:0;
}

.side-menu{
padding:18px;
background:#1c1c1c;
border-radius:15px;
margin-bottom:15px;
font-size:17px;
cursor:pointer;
transition:.2s;
}

.side-menu:hover{
background:#ff1f1f;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
z-index:998;
}

.overlay.active{
display:block;
}

/* CONTENT */

.container{
padding:90px 20px 20px;
}

.card{
background:#121212;
padding:25px;
border-radius:25px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(255,0,0,.1);
}

.title{
font-size:28px;
margin-bottom:18px;
color:#ff3b3b;
}

.balance{
font-size:55px;
font-weight:bold;
color:#00ff99;
}

.username{
font-size:18px;
color:#ccc;
margin-top:10px;
}

/* INPUT */

.input{
width:100%;
padding:18px;
margin-top:15px;
border:none;
outline:none;
border-radius:15px;
background:#1d1d1d;
color:white;
font-size:17px;
}

.submit-btn{
width:100%;
padding:18px;
margin-top:18px;
border:none;
border-radius:15px;
background:linear-gradient(90deg,#ff1f1f,#9b0000);
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

/* CHECKBOX */

.checkbox{
display:flex;
align-items:center;
gap:10px;
margin-top:20px;
font-size:17px;
}

/* ANIMASI */

.animasi{
display:none;
margin-top:20px;
padding:20px;
border-radius:18px;
background:#102910;
color:#00ff8c;
font-size:18px;
text-align:center;
animation:pulse 1s infinite;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.03);
}

100%{
transform:scale(1);
}

}

/* LOADING */

.loading-box{
width:100%;
height:28px;
background:#222;
border-radius:30px;
overflow:hidden;
margin-top:20px;
display:none;
}

.loading-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff1f1f,#ff7b00);
text-align:center;
line-height:28px;
font-weight:bold;
}

/* TABLE */

.table-box{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:850px;
margin-top:20px;
}

th{
background:#ff1f1f;
padding:14px;
}

td{
background:#171717;
padding:14px;
text-align:center;
border-bottom:1px solid #222;
word-break:break-all;
}

/* FOOTER */

.footer{
text-align:center;
padding:40px 20px;
color:#666;
}

/* MOBILE */

@media(max-width:700px){

.balance{
font-size:40px;
}

.logo{
font-size:24px;
}

}

</style>
</head>
<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="left-top">

<div class="menu-btn"
onclick="toggleSidebar()">
☰
</div>

<div class="logo">
Flowbit
</div>

</div>

<button class="logout-btn"
onclick="logout()">
Logout
</button>

</div>

<!-- SIDEBAR -->

<div class="sidebar"
id="sidebar">

<div class="side-menu">
🏠 Dashboard
</div>

<div class="side-menu">
📈 Shopee Views
</div>

<div class="side-menu"
onclick="topup()">
💰 Top Up Koin
</div>

<div class="side-menu"
onclick="logout()">
🚪 Logout
</div>

</div>

<div class="overlay"
id="overlay"
onclick="toggleSidebar()">
</div>

<!-- CONTENT -->

<div class="container">

<!-- USER -->

<div class="card">

<div class="title">
Dashboard Member
</div>

<div class="balance">
<span id="saldo">0</span>
</div>

<div class="username">
User :
<span id="usernameText">
-
</span>
</div>

</div>

<!-- BOOSTER -->

<div class="card">

<div class="title">
Shopee Views Booster
</div>

<input
type="text"
id="link"
class="input"
placeholder="Masukkan Link Shopee">

<input
type="number"
id="views"
class="input"
placeholder="Jumlah Views Kelipatan 1000">

<input
type="text"
id="koin"
class="input"
placeholder="Total Koin"
readonly>

<div class="checkbox">

<input type="checkbox"
id="trafik">

<label>
Sebar trafik seluruh Indonesia
</label>

</div>

<div class="animasi"
id="animasi">
Menyiapkan Sebaran Trafik...
</div>

<button
class="submit-btn"
id="submitBtn"
onclick="submitOrder()">

Booster Views

</button>

<div class="loading-box"
id="loadingBox">

<div class="loading-bar"
id="loadingBar">

0%

</div>

</div>

</div>

<!-- HISTORY -->

<div class="card">

<div class="title">
History Trafik
</div>

<div class="table-box">

<table id="historyTable">

<tr>

<th>No</th>
<th>Link</th>
<th>Views</th>
<th>Koin</th>
<th>Status</th>

</tr>

</table>

</div>

</div>

</div>

<div class="footer">
@flowbitappadheprabowo2026
</div>

<script>

/* SUPABASE */

const supabaseUrl =
"https://yvbxrzqylnimojukokul.supabase.co";

const supabaseKey =
"sb_publishable_1cfPIPZqPhSbhLTcvt8yHw_9qK_g4iO";

const supabase =
window.supabase.createClient(
supabaseUrl,
supabaseKey
);

/* LOGIN USER */

const userData =
JSON.parse(
localStorage.getItem("userLogin")
);

if(!userData){

window.location.href="index.html";

}

const username =
userData.username;

/* SIDEBAR */

function toggleSidebar(){

document.getElementById("sidebar")
.classList.toggle("active");

document.getElementById("overlay")
.classList.toggle("active");

}

/* TOPUP */

function topup(){

window.open(
"https://wa.me/6282131974325?text=Halo%20saya%20ingin%20topup%20koin",
"_blank"
);

}

/* LOAD USER */

async function loadUser(){

const { data,error } =
await supabase
.from("users")
.select("*")
.eq("username",username)
.single();

if(error){

console.log(error);
return;

}

document.getElementById("saldo")
.innerText = data.saldo || 0;

document.getElementById("usernameText")
.innerText = data.username;

}

loadUser();

setInterval(loadUser,3000);

/* KOIN */

document.getElementById("views")
.addEventListener("input",()=>{

let views =
parseInt(
document.getElementById("views").value
) || 0;

let koin =
Math.floor(views / 1000);

document.getElementById("koin")
.value = koin;

});

/* TRAFIK */

document.getElementById("trafik")
.addEventListener("change",()=>{

const animasi =
document.getElementById("animasi");

if(document.getElementById("trafik").checked){

animasi.style.display = "block";

let persen = 0;

let interval =
setInterval(()=>{

persen++;

animasi.innerHTML =
"Menjangkau Seluruh Indonesia... "
+
persen +
"%";

if(persen >= 100){

clearInterval(interval);

animasi.innerHTML =
"Sebaran Trafik Seluruh Indonesia Berhasil";

setTimeout(()=>{

animasi.style.display="none";

},3000);

}

},100);

}else{

animasi.style.display="none";

}

});

/* CEK PENDING */

async function checkPending(){

const { data } =
await supabase
.from("orders")
.select("*")
.eq("username",username)
.eq("status","Pending");

if(data.length > 0){

document.getElementById("submitBtn")
.disabled = true;

document.getElementById("submitBtn")
.style.opacity = ".5";

document.getElementById("submitBtn")
.innerText =
"Masih Ada Order Pending";

}else{

document.getElementById("submitBtn")
.disabled = false;

document.getElementById("submitBtn")
.style.opacity = "1";

document.getElementById("submitBtn")
.innerText =
"Booster Views";

}

}

checkPending();

setInterval(checkPending,5000);

/* SUBMIT ORDER */

async function submitOrder(){

let link =
document.getElementById("link").value;

let views =
parseInt(
document.getElementById("views").value
);

let koin =
parseInt(
document.getElementById("koin").value
);

if(!link || !views){

alert("Lengkapi data");
return;

}

if(views % 1000 !== 0){

alert("Views harus kelipatan 1000");
return;

}

/* USER */

const { data:user } =
await supabase
.from("users")
.select("*")
.eq("username",username)
.single();

if(user.saldo < koin){

alert("Koin tidak cukup");
return;

}

/* LOADING */

let loadingBox =
document.getElementById("loadingBox");

let loadingBar =
document.getElementById("loadingBar");

loadingBox.style.display="block";

let width = 0;

let interval =
setInterval(()=>{

width++;

loadingBar.style.width =
width + "%";

loadingBar.innerHTML =
width + "%";

if(width >= 100){

clearInterval(interval);

}

},40);

/* UPDATE SALDO */

let saldoBaru =
user.saldo - koin;

await supabase
.from("users")
.update({
saldo:saldoBaru
})
.eq("username",username);

/* UPDATE UI */

document.getElementById("saldo")
.innerText = saldoBaru;

/* INSERT HISTORY */

await supabase
.from("orders")
.insert([{

username:username,

link:link,

views:views,

coins:koin,

status:"Pending"

}]);

/* REFRESH */

loadHistory();

document.getElementById("link").value="";
document.getElementById("views").value="";
document.getElementById("koin").value="";

alert("Order berhasil dikirim");

}

/* HISTORY */

async function loadHistory(){

const { data,error } =
await supabase
.from("orders")
.select("*")
.eq("username",username)
.order("id",{ascending:false});

if(error){

console.log(error);
return;

}

const table =
document.getElementById("historyTable");

table.innerHTML = `

<tr>

<th>No</th>
<th>Link</th>
<th>Views</th>
<th>Koin</th>
<th>Status</th>

</tr>

`;

let no = 1;

data.forEach(item=>{

table.innerHTML += `

<tr>

<td>${no++}</td>

<td>${item.link}</td>

<td>${item.views}</td>

<td>${item.coins}</td>

<td style="color:orange;">
${item.status}
</td>

</tr>

`;

});

}

loadHistory();

setInterval(loadHistory,5000);

/* LOGOUT */

function logout(){

localStorage.clear();

window.location.href="index.html";

}

</script>

</body>
</html>
