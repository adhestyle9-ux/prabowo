<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flowbit Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

/* TOPBAR */

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
background:linear-gradient(90deg,#ff2020,#8b0000);
display:flex;
align-items:center;
padding:0 20px;
z-index:9999;
box-shadow:0 0 20px rgba(255,0,0,.4);
}

.menu-btn{
font-size:35px;
cursor:pointer;
margin-right:20px;
}

.logo{
font-size:35px;
font-weight:bold;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-280px;
width:280px;
height:100%;
background:#111;
padding:90px 20px;
transition:.3s;
z-index:10000;
overflow:auto;
}

.sidebar.active{
left:0;
}

.side-menu{
background:#1a1a1a;
padding:18px;
border-radius:15px;
margin-bottom:15px;
cursor:pointer;
font-size:17px;
}

.side-menu:hover{
background:#ff2020;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
z-index:9998;
}

.overlay.active{
display:block;
}

/* CONTENT */

.container{
padding:100px 20px 20px;
}

.card{
background:#141414;
padding:25px;
border-radius:25px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(255,0,0,.1);
}

.title{
font-size:30px;
margin-bottom:20px;
color:#ff4a4a;
}

.saldo{
font-size:60px;
font-weight:bold;
color:#00ff99;
}

.username{
margin-top:10px;
font-size:20px;
}

/* INPUT */

.input{
width:100%;
padding:18px;
border:none;
outline:none;
border-radius:15px;
background:#222;
color:white;
margin-top:15px;
font-size:17px;
}

.submit-btn{
width:100%;
padding:18px;
border:none;
border-radius:15px;
margin-top:20px;
background:linear-gradient(90deg,#ff2020,#b10000);
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

/* CHECKBOX */

.checkbox{
display:flex;
align-items:center;
gap:10px;
margin-top:20px;
font-size:17px;
}

/* LOADING */

.loading-box{
width:100%;
height:30px;
background:#222;
border-radius:30px;
overflow:hidden;
margin-top:20px;
display:none;
}

.loading-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff2020,#ff8800);
text-align:center;
line-height:30px;
font-weight:bold;
}

/* TABLE */

.table-box{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:700px;
margin-top:20px;
}

th{
background:#ff2020;
padding:15px;
}

td{
background:#181818;
padding:15px;
text-align:center;
border-bottom:1px solid #222;
word-break:break-all;
}

.pending{
color:orange;
}

.process{
color:yellow;
}

.complete{
color:#00ff99;
}

.footer{
padding:40px;
text-align:center;
color:#666;
}

</style>
</head>
<body>

<!-- OVERLAY -->

<div class="overlay" id="overlay"></div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<div class="side-menu">
🏠 Dashboard
</div>

<div class="side-menu">
📈 Shopee Views
</div>

<div class="side-menu">
💰 Koin :
<span id="saldoSidebar">
0
</span>
</div>

<div class="side-menu">
👤 Username :
<span id="sidebarUsername">
-
</span>
</div>

<div class="side-menu" onclick="logout()">
🚪 Logout
</div>

</div>

<!-- TOPBAR -->

<div class="topbar">

<div class="menu-btn" id="menuBtn">
☰
</div>

<div class="logo">
Flowbit
</div>

</div>

<!-- CONTENT -->

<div class="container">

<!-- MEMBER -->

<div class="card">

<div class="title">
Dashboard Member
</div>

<div class="saldo" id="saldo">
0
</div>

<div class="username">
User :
<span id="username">
-
</span>
</div>

</div>

<!-- BOOSTER -->

<div class="card">

<div class="title">
Shopee Views Booster
</div>

<input
type="text"
id="link"
class="input"
placeholder="Masukkan Link Shopee">

<input
type="number"
id="views"
class="input"
placeholder="Jumlah Views Kelipatan 1000">

<input
type="text"
id="koin"
class="input"
placeholder="Total Koin"
readonly>

<div class="checkbox">

<input type="checkbox">

<label>
Sebar trafik seluruh Indonesia
</label>

</div>

<button
class="submit-btn"
onclick="submitOrder()">

Booster Views

</button>

<div class="loading-box" id="loadingBox">

<div class="loading-bar" id="loadingBar">
0%
</div>

</div>

</div>

<!-- HISTORY -->

<div class="card">

<div class="title">
History Order
</div>

<div class="table-box">

<table id="historyTable">

<tr>

<th>Link</th>
<th>Views</th>
<th>Koin</th>
<th>Status</th>

</tr>

</table>

</div>

</div>

</div>

<div class="footer">
@flowbitapp
</div>

<script>

/* =========================
SUPABASE
========================= */

const supabaseUrl =
'https://yvbxrzqylnimojukokul.supabase.co';

const supabaseKey =
'sb_publishable_1cfPIPZqPhSbhLTcvt8yHw_9qK_g4iO';

const supabase =
window.supabase.createClient(
supabaseUrl,
supabaseKey
);

/* =========================
SIDEBAR
========================= */

const sidebar =
document.getElementById('sidebar');

const overlay =
document.getElementById('overlay');

document
.getElementById('menuBtn')
.onclick=()=>{

sidebar.classList.add('active');

overlay.classList.add('active');

};

overlay.onclick=()=>{

sidebar.classList.remove('active');

overlay.classList.remove('active');

};

/* =========================
LOGIN
========================= */

const loginData =
JSON.parse(
localStorage.getItem('userLogin')
);

if(!loginData){

window.location.href='index.html';

}

const username =
loginData.username;

/* =========================
LOAD USER
========================= */

async function loadUser(){

const { data,error } =
await supabase
.from('users')
.select('*')
.eq('username',username)
.single();

if(error){

console.log(error);
return;

}

/* USERNAME */

document.getElementById('username')
.innerText =
data.username;

document.getElementById('sidebarUsername')
.innerText =
data.username;

/* SALDO */

document.getElementById('saldo')
.innerText =
data.saldo || 0;

document.getElementById('saldoSidebar')
.innerText =
data.saldo || 0;

}

loadUser();

setInterval(loadUser,3000);

/* =========================
KOIN
========================= */

document
.getElementById('views')
.addEventListener('input',()=>{

let views =
parseInt(
document.getElementById('views').value
) || 0;

let hasil =
Math.floor(views / 1000);

document.getElementById('koin')
.value =
hasil;

});

/* =========================
ORDER
========================= */

let pendingOrder=false;

async function submitOrder(){

if(pendingOrder){

alert('Masih ada order diproses');
return;

}

const link =
document.getElementById('link').value;

const views =
parseInt(
document.getElementById('views').value
);

const coins =
parseInt(
document.getElementById('koin').value
);

if(!link || !views){

alert('Lengkapi data');
return;

}

const { data:user,error } =
await supabase
.from('users')
.select('*')
.eq('username',username)
.single();

if(error){

alert('User tidak ditemukan');
return;

}

if(user.saldo < coins){

alert('Koin tidak cukup');
return;

}

/* UPDATE SALDO */

const saldoBaru =
user.saldo - coins;

await supabase
.from('users')
.update({

saldo:saldoBaru

})
.eq('username',username);

/* INSERT ORDER */

await supabase
.from('orders')
.insert([{

username:username,
link:link,
views:views,
coins:coins,
status:'Pending'

}]);

/* LOADING */

let loadingBox =
document.getElementById('loadingBox');

let loadingBar =
document.getElementById('loadingBar');

loadingBox.style.display='block';

let width=0;

let interval=setInterval(()=>{

width++;

loadingBar.style.width=
width+'%';

loadingBar.innerHTML=
width+'%';

if(width>=100){

clearInterval(interval);

}

},40);

/* TABLE */

const table =
document.getElementById('historyTable');

const row =
table.insertRow(-1);

row.insertCell(0).innerHTML=
link;

row.insertCell(1).innerHTML=
views;

row.insertCell(2).innerHTML=
coins;

row.insertCell(3).innerHTML=
'<span class="pending">Pending</span>';

/* STATUS */

pendingOrder=true;

setTimeout(()=>{

table.rows[
table.rows.length-1
].cells[3].innerHTML=
'<span class="process">Process</span>';

},5000);

setTimeout(()=>{

table.rows[
table.rows.length-1
].cells[3].innerHTML=
'<span class="complete">Complete</span>';

pendingOrder=false;

},12000);

/* RESET */

document.getElementById('link').value='';

document.getElementById('views').value='';

document.getElementById('koin').value='';

loadUser();

}

/* =========================
LOAD HISTORY
========================= */

async function loadHistory(){

const { data,error } =
await supabase
.from('orders')
.select('*')
.eq('username',username)
.order('id',{ascending:false});

if(error){

console.log(error);
return;

}

const table =
document.getElementById('historyTable');

table.innerHTML=`

<tr>

<th>Link</th>
<th>Views</th>
<th>Koin</th>
<th>Status</th>

</tr>

`;

data.forEach(item=>{

table.innerHTML += `

<tr>

<td>${item.link}</td>

<td>${item.views}</td>

<td>${item.coins}</td>

<td>${item.status}</td>

</tr>

`;

});

}

loadHistory();

setInterval(loadHistory,5000);

/* =========================
LOGOUT
========================= */

function logout(){

localStorage.removeItem('userLogin');

window.location.href='index.html';

}

</script>

</body>
</html>
