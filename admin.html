<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowbit Admin</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:white;
overflow-x:hidden;
}

/* LOGIN */

#loginPage{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-box{
width:100%;
max-width:420px;
background:#1b1b1b;
padding:35px;
border-radius:25px;
box-shadow:0 0 40px rgba(255,0,0,0.3);
}

.login-box h1{
text-align:center;
font-size:50px;
margin-bottom:30px;
color:#ff3d3d;
}

.input{
width:100%;
padding:18px;
margin-bottom:20px;
border:none;
outline:none;
border-radius:15px;
background:#262626;
color:white;
font-size:18px;
}

.btn{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:22px;
font-weight:bold;
cursor:pointer;
color:white;
background:linear-gradient(90deg,#ff4d4d,#a80000);
}

#error{
text-align:center;
margin-top:15px;
color:#ff4444;
}

/* DASHBOARD */

#dashboard{
display:none;
}

.topbar{
width:100%;
padding:20px;
font-size:35px;
font-weight:bold;
background:linear-gradient(90deg,#ff2d2d,#800000);
position:sticky;
top:0;
z-index:999;
}

.container{
display:flex;
}

/* SIDEBAR */

.sidebar{
width:250px;
background:#171717;
min-height:100vh;
padding:20px;
}

.sidebar button{
width:100%;
padding:16px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#252525;
color:white;
font-size:18px;
cursor:pointer;
text-align:left;
}

.sidebar button:hover{
background:#ff2d2d;
}

/* CONTENT */

.content{
flex:1;
padding:25px;
}

.card{
background:#1b1b1b;
padding:25px;
border-radius:20px;
margin-bottom:25px;
}

.card h2{
margin-bottom:15px;
color:#ff4444;
}

.stat{
font-size:40px;
font-weight:bold;
color:#00ffb3;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table th{
background:#ff2d2d;
padding:15px;
}

table td{
background:#222;
padding:15px;
text-align:center;
font-size:14px;
}

.action{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
margin:2px;
}

.plus{
background:#00aa55;
}

.minus{
background:#ff9900;
}

.delete{
background:#cc0000;
}

.copy{
background:#0066ff;
}

.logout{
background:#cc0000;
margin-top:40px;
}

@media(max-width:900px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
min-height:auto;
}

}

</style>
</head>
<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="login-box">

<h1>Admin Login</h1>

<input type="text" id="username" class="input" placeholder="Username">

<input type="password" id="password" class="input" placeholder="Password">

<button class="btn" onclick="loginAdmin()">
Login Admin
</button>

<div id="error"></div>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div class="topbar">
Flowbit Admin Panel
</div>

<div class="container">

<div class="sidebar">

<button onclick="showPage('dash')">
📊 Dashboard
</button>

<button onclick="showPage('member')">
👥 Member
</button>

<button onclick="showPage('history')">
📜 History
</button>

<button class="logout" onclick="logoutAdmin()">
🚪 Logout
</button>

</div>

<div class="content">

<!-- DASH -->

<div id="dash">

<div class="card">
<h2>Total User</h2>
<div class="stat" id="totalUser">0</div>
</div>

<div class="card">
<h2>Total Koin</h2>
<div class="stat" id="totalKoin">0</div>
</div>

<div class="card">
<h2>Total Pendapatan</h2>
<div class="stat" id="pendapatan">Rp0</div>
</div>

</div>

<!-- MEMBER -->

<div id="member" style="display:none;">

<div class="card">

<h2>Daftar Member</h2>

<table>

<thead>
<tr>
<th>User</th>
<th>Password</th>
<th>Email</th>
<th>No HP</th>
<th>Koin</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="memberTable"></tbody>

</table>

</div>

</div>

<!-- HISTORY -->

<div id="history" style="display:none;">

<div class="card">

<h2>History Booster</h2>

<table>

<thead>
<tr>
<th>User</th>
<th>Link</th>
<th>Views</th>
<th>Koin</th>
<th>Tanggal</th>
</tr>
</thead>

<tbody id="historyTable"></tbody>

</table>

</div>

</div>

</div>

</div>

</div>

<script>

/* SUPABASE */

const { createClient } = supabase;

const supabaseClient = createClient(
"https://yvbxrzqylnimojukokul.supabase.co",
"sb_publishable_1cfPIPZqPhSbhLTcvt8yHw_9qK_g4iO"
);

/* LOGIN */

function loginAdmin(){

const user =
document.getElementById("username").value;

const pass =
document.getElementById("password").value;

if(
user === "Admin" &&
pass === "Adhe191292"
){

localStorage.setItem("admin","yes");

document.getElementById("loginPage").style.display="none";

document.getElementById("dashboard").style.display="block";

loadData();

}else{

document.getElementById("error").innerHTML =
"Username atau Password salah";

}

}

window.onload=function(){

if(localStorage.getItem("admin")==="yes"){

document.getElementById("loginPage").style.display="none";

document.getElementById("dashboard").style.display="block";

loadData();

}

}

function logoutAdmin(){

localStorage.removeItem("admin");

location.reload();

}

/* MENU */

function showPage(page){

document.getElementById("dash").style.display="none";
document.getElementById("member").style.display="none";
document.getElementById("history").style.display="none";

document.getElementById(page).style.display="block";

}

/* LOAD DATA */

async function loadData(){

/* USERS */

const { data:users } =
await supabaseClient
.from("users")
.select("*");

document.getElementById("totalUser")
.innerHTML = users.length;

/* TOTAL KOIN */

let totalKoin = 0;

users.forEach(u=>{

totalKoin += Number(u.saldo || 0);

});

document.getElementById("totalKoin")
.innerHTML = totalKoin;

/* PENDAPATAN */

document.getElementById("pendapatan")
.innerHTML =
"Rp" +
(totalKoin * 3000)
.toLocaleString("id-ID");

/* MEMBER TABLE */

let html="";

users.forEach(user=>{

html += `
<tr>

<td>${user.username}</td>

<td>
${user.password}
<br><br>

<button class="action copy"
onclick="copyPass('${user.password}')">
Salin
</button>

</td>

<td>${user.email}</td>

<td>${user.phone}</td>

<td>${user.saldo}</td>

<td>

<button class="action plus"
onclick="tambahKoin(${user.id},${user.saldo})">
+Koin
</button>

<button class="action minus"
onclick="kurangKoin(${user.id},${user.saldo})">
-Koin
</button>

<button class="action delete"
onclick="hapusUser(${user.id})">
Hapus
</button>

</td>

</tr>
`;

});

document.getElementById("memberTable")
.innerHTML = html;

/* HISTORY */

const { data:orders } =
await supabaseClient
.from("orders")
.select("*")
.order("created_at",{ascending:false});

let history="";

orders.forEach(o=>{

history += `
<tr>

<td>${o.username}</td>

<td>${o.link}</td>

<td>${o.views}</td>

<td>${o.coins}</td>

<td>${o.created_at}</td>

</tr>
`;

});

document.getElementById("historyTable")
.innerHTML = history;

}

/* COPY PASSWORD */

function copyPass(text){

navigator.clipboard.writeText(text);

alert("Password disalin");

}

/* TAMBAH KOIN */

async function tambahKoin(id,saldo){

let jumlah = prompt("Tambah koin:");

if(!jumlah) return;

jumlah = parseInt(jumlah);

await supabaseClient
.from("users")
.update({
saldo: saldo + jumlah
})
.eq("id",id);

loadData();

}

/* KURANG KOIN */

async function kurangKoin(id,saldo){

let jumlah = prompt("Kurangi koin:");

if(!jumlah) return;

jumlah = parseInt(jumlah);

await supabaseClient
.from("users")
.update({
saldo: saldo - jumlah
})
.eq("id",id);

loadData();

}

/* HAPUS USER */

async function hapusUser(id){

if(confirm("Hapus user?")){

await supabaseClient
.from("users")
.delete()
.eq("id",id);

loadData();

}

}

</script>

</body>
</html>
