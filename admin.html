<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowbit Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

/* LOGIN */

.login-page{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-box{
width:100%;
max-width:420px;
background:linear-gradient(135deg,#171717,#2a120f);
padding:40px;
border-radius:35px;
box-shadow:0 0 40px rgba(255,0,0,.2);
}

.login-title{
font-size:42px;
font-weight:bold;
text-align:center;
margin-bottom:30px;
color:#ff3b3b;
}

.input{
width:100%;
padding:18px;
background:#1d1d1d;
border:none;
border-radius:18px;
color:white;
margin-top:18px;
font-size:16px;
outline:none;
}

.btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
margin-top:20px;
background:linear-gradient(90deg,#ff2b2b,#700000);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.02);
}

/* TOPBAR */

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
background:linear-gradient(90deg,#ff2b2b,#700000,#2b0000);
display:flex;
align-items:center;
padding:0 20px;
z-index:999;
}

.menu-btn{
font-size:30px;
cursor:pointer;
}

.logo{
font-size:28px;
font-weight:bold;
margin-left:20px;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:-320px;
width:280px;
height:100%;
background:#111;
padding:90px 20px 20px;
transition:.4s;
z-index:1000;
box-shadow:0 0 40px rgba(255,0,0,.2);
}

.sidebar.active{
left:0;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
z-index:998;
}

.overlay.active{
display:block;
}

.menu-item{
padding:18px;
border-radius:18px;
background:#1d1d1d;
margin-bottom:15px;
cursor:pointer;
transition:.3s;
font-size:17px;
}

.menu-item:hover{
background:#ff2f2f;
transform:translateX(5px);
}

/* CONTENT */

.content{
padding:90px 15px 30px;
display:none;
}

/* CARD */

.card{
background:linear-gradient(135deg,#171717,#24110f);
padding:25px;
border-radius:28px;
margin-bottom:20px;
box-shadow:0 0 30px rgba(255,0,0,.12);
}

.title{
font-size:34px;
font-weight:bold;
margin-bottom:20px;
color:#ff4444;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.stat-card{
background:#1b1b1b;
padding:25px;
border-radius:25px;
}

.stat-card h2{
font-size:40px;
margin-top:10px;
color:#00ff95;
}

/* TABLE */

.table-box{
overflow:auto;
margin-top:20px;
}

table{
width:100%;
border-collapse:collapse;
min-width:1200px;
}

th{
background:#1f1f1f;
padding:15px;
}

td{
padding:15px;
border-bottom:1px solid #2c2c2c;
text-align:center;
}

.action-btn{
padding:10px 15px;
border:none;
border-radius:12px;
cursor:pointer;
margin:3px;
font-size:13px;
font-weight:bold;
color:white;
}

.add{
background:#00b96b;
}

.minus{
background:orange;
}

.delete{
background:red;
}

.copy{
background:#006eff;
}

.online{
color:#00ff95;
font-weight:bold;
}

footer{
text-align:center;
padding:40px;
color:#666;
}

</style>

</head>
<body>

<!-- LOGIN -->

<div class="login-page"
id="loginPage">

<div class="login-box">

<div class="login-title">
Admin Login
</div>

<input type="text"
class="input"
id="adminUser"
placeholder="Username">

<input type="password"
class="input"
id="adminPass"
placeholder="Password">

<button class="btn"
onclick="loginAdmin()">

Login Admin

</button>

</div>

</div>

<!-- PANEL -->

<div id="adminPanel"
style="display:none;">

<!-- TOPBAR -->

<div class="topbar">

<div class="menu-btn"
onclick="toggleSidebar()">
☰
</div>

<div class="logo">
Flowbit Admin
</div>

</div>

<!-- SIDEBAR -->

<div class="sidebar"
id="sidebar">

<div class="menu-item"
onclick="showPage('dashboardPage')">
📊 Dashboard
</div>

<div class="menu-item"
onclick="showPage('memberPage')">
👥 Daftar Member
</div>

<div class="menu-item"
onclick="showPage('historyPage')">
📜 History User
</div>

<div class="menu-item"
onclick="logoutAdmin()">
🚪 Logout
</div>

</div>

<div class="overlay"
id="overlay"
onclick="toggleSidebar()">
</div>

<!-- CONTENT -->

<div class="content"
id="content">

<!-- DASHBOARD -->

<div id="dashboardPage">

<div class="card">

<div class="title">
Dashboard Admin
</div>

<div class="stats">

<div class="stat-card">

<p>Total User</p>

<h2 id="totalUsers">
0
</h2>

</div>

<div class="stat-card">

<p>Total Koin Dikirim</p>

<h2 id="totalKoin">
0
</h2>

</div>

<div class="stat-card">

<p>Total Pendapatan</p>

<h2 id="pendapatan">
Rp0
</h2>

</div>

</div>

</div>

</div>

<!-- MEMBER -->

<div id="memberPage"
style="display:none;">

<div class="card">

<div class="title">
Daftar Member
</div>

<div class="table-box">

<table>

<thead>

<tr>
<th>Username</th>
<th>Password</th>
<th>Email</th>
<th>No HP</th>
<th>Saldo</th>
<th>Aksi</th>
</tr>

</thead>

<tbody id="memberTable">

</tbody>

</table>

</div>

</div>

</div>

<!-- HISTORY -->

<div id="historyPage"
style="display:none;">

<div class="card">

<div class="title">
History User Booster
</div>

<div class="table-box">

<table>

<thead>

<tr>
<th>Username</th>
<th>Tanggal</th>
<th>Link</th>
<th>View</th>
<th>Koin</th>
<th>Status</th>
</tr>

</thead>

<tbody id="historyTable">

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

<footer>
@flowbitappadheprabowo2026
</footer>

<script>

/* SUPABASE */

const supabaseUrl =
'https://yvbxrzqylnimojukokul.supabase.co';

const supabaseKey =
'sb_publishable_1cfPIPZqPhSbhLTcvt8yHw_9qK_g4iO';

const supabase =
window.supabase.createClient(
supabaseUrl,
supabaseKey
);

/* LOGIN */

function loginAdmin(){

let username =
document.getElementById('adminUser').value;

let password =
document.getElementById('adminPass').value;

if(username === 'Admin'
&& password === 'Admin191292'){

document.getElementById('loginPage')
.style.display='none';

document.getElementById('adminPanel')
.style.display='block';

document.getElementById('content')
.style.display='block';

loadUsers();
loadOrders();

}else{

alert('Login gagal');

}

}

/* SIDEBAR */

function toggleSidebar(){

document.getElementById('sidebar')
.classList.toggle('active');

document.getElementById('overlay')
.classList.toggle('active');

}

/* PAGE */

function showPage(page){

document.getElementById('dashboardPage')
.style.display='none';

document.getElementById('memberPage')
.style.display='none';

document.getElementById('historyPage')
.style.display='none';

document.getElementById(page)
.style.display='block';

toggleSidebar();

}

/* LOGOUT */

function logoutAdmin(){

location.reload();

}

/* LOAD USERS */

async function loadUsers(){

const { data, error } =
await supabase
.from('users')
.select('*');

let table =
document.getElementById('memberTable');

table.innerHTML='';

let totalKoin = 0;

document.getElementById('totalUsers')
.innerText=data.length;

data.forEach(user=>{

totalKoin += user.saldo || 0;

table.innerHTML += `

<tr>

<td>${user.username}</td>

<td>

${user.password}

<br><br>

<button class="action-btn copy"
onclick="copyPassword('${user.password}')">

Salin Password

</button>

</td>

<td>${user.email}</td>

<td>${user.phone}</td>

<td>${user.saldo}</td>

<td>

<button class="action-btn add"
onclick="tambahKoin(${user.id})">

+Koin

</button>

<button class="action-btn minus"
onclick="kurangiKoin(${user.id})">

-Koin

</button>

<button class="action-btn delete"
onclick="hapusUser(${user.id})">

Hapus

</button>

</td>

</tr>

`;

});

document.getElementById('totalKoin')
.innerText=totalKoin;

document.getElementById('pendapatan')
.innerText='Rp'+
(totalKoin*3000)
.toLocaleString();

}

/* LOAD ORDERS */

async function loadOrders(){

const { data, error } =
await supabase
.from('orders')
.select('*')
.order('created_at',{
ascending:false
});

let table=
document.getElementById('historyTable');

table.innerHTML='';

data.forEach(order=>{

table.innerHTML += `

<tr>

<td>${order.username}</td>

<td>${order.created_at}</td>

<td>${order.link}</td>

<td>${order.views}</td>

<td>${order.coins}</td>

<td>${order.status}</td>

</tr>

`;

});

}

/* COPY PASSWORD */

function copyPassword(pass){

navigator.clipboard.writeText(pass);

alert('Password disalin');

}

/* TAMBAH KOIN */

async function tambahKoin(id){

let jumlah =
prompt('Tambah koin');

if(!jumlah) return;

const { data:user } =
await supabase
.from('users')
.select('*')
.eq('id',id)
.single();

let saldoBaru =
(user.saldo || 0)
+ parseInt(jumlah);

await supabase
.from('users')
.update({
saldo:saldoBaru
})
.eq('id',id);

alert('Koin berhasil ditambah');

loadUsers();

}

/* KURANGI KOIN */

async function kurangiKoin(id){

let jumlah =
prompt('Kurangi koin');

if(!jumlah) return;

const { data:user } =
await supabase
.from('users')
.select('*')
.eq('id',id)
.single();

let saldoBaru =
(user.saldo || 0)
- parseInt(jumlah);

if(saldoBaru < 0){
saldoBaru = 0;
}

await supabase
.from('users')
.update({
saldo:saldoBaru
})
.eq('id',id);

alert('Koin berhasil dikurangi');

loadUsers();

}

/* HAPUS USER */

async function hapusUser(id){

if(confirm('Hapus user?')){

await supabase
.from('users')
.delete()
.eq('id',id);

alert('User berhasil dihapus');

loadUsers();

}

}

</script>

</body>
</html>
