<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowbit Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:white;
overflow-x:hidden;
}

/* LOGIN */

.login-page{
width:100%;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-box{
width:100%;
max-width:420px;
background:#1a1a1a;
padding:35px;
border-radius:25px;
box-shadow:0 0 40px rgba(255,0,0,0.3);
border:1px solid rgba(255,255,255,0.1);
}

.login-box h1{
font-size:50px;
text-align:center;
margin-bottom:30px;
color:#ff3d3d;
}

.input-box{
width:100%;
padding:18px;
border:none;
outline:none;
border-radius:15px;
background:#222;
color:white;
margin-bottom:20px;
font-size:18px;
}

.login-btn{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:22px;
font-weight:bold;
color:white;
cursor:pointer;
background:linear-gradient(90deg,#ff4d4d,#b30000);
}

.error{
text-align:center;
margin-top:15px;
color:#ff4d4d;
font-size:15px;
}

/* DASHBOARD */

.dashboard{
display:none;
}

.topbar{
width:100%;
padding:20px;
background:linear-gradient(90deg,#ff2d2d,#8b0000);
font-size:35px;
font-weight:bold;
position:sticky;
top:0;
z-index:999;
}

.container{
display:flex;
}

/* SIDEBAR */

.sidebar{
width:260px;
min-height:100vh;
background:#161616;
padding:20px;
position:fixed;
left:0;
top:80px;
}

.sidebar button{
width:100%;
padding:16px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#242424;
color:white;
font-size:18px;
cursor:pointer;
text-align:left;
}

.sidebar button:hover{
background:#ff2d2d;
}

/* CONTENT */

.content{
margin-left:280px;
padding:25px;
width:100%;
}

.card{
background:#1a1a1a;
padding:25px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 0 20px rgba(255,0,0,0.1);
}

.card h2{
margin-bottom:15px;
color:#ff4d4d;
}

.stat{
font-size:40px;
font-weight:bold;
margin-top:10px;
color:#00ffb3;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table th{
background:#ff2d2d;
padding:15px;
}

table td{
padding:15px;
background:#222;
text-align:center;
font-size:14px;
}

.action-btn{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
margin:3px;
}

.plus{
background:#00aa55;
}

.minus{
background:#ff8800;
}

.delete{
background:#cc0000;
}

.copy{
background:#0066ff;
}

.logout{
background:#ff2d2d;
margin-top:40px;
}

@media(max-width:900px){

.sidebar{
width:100%;
position:relative;
top:0;
min-height:auto;
}

.content{
margin-left:0;
}

.container{
flex-direction:column;
}

}

</style>
</head>
<body>

<!-- LOGIN -->

<div class="login-page" id="loginPage">

<div class="login-box">

<h1>Admin Login</h1>

<input type="text" id="adminUser" class="input-box" placeholder="Username">

<input type="password" id="adminPass" class="input-box" placeholder="Password">

<button class="login-btn" onclick="loginAdmin()">
Login Admin
</button>

<div class="error" id="errorText"></div>

</div>
</div>

<!-- DASHBOARD -->

<div class="dashboard" id="dashboardPage">

<div class="topbar">
Flowbit Admin Panel
</div>

<div class="container">

<div class="sidebar">

<button onclick="showPage('dash')">
📊 Dashboard
</button>

<button onclick="showPage('member')">
👥 Member
</button>

<button onclick="showPage('history')">
📜 History
</button>

<button class="logout" onclick="logoutAdmin()">
🚪 Logout
</button>

</div>

<div class="content">

<!-- DASH -->

<div id="dash">

<div class="card">
<h2>Total User</h2>
<div class="stat" id="totalUser">0</div>
</div>

<div class="card">
<h2>Total Koin Terkirim</h2>
<div class="stat" id="totalKoin">0</div>
</div>

<div class="card">
<h2>Total Pendapatan</h2>
<div class="stat" id="totalUang">Rp0</div>
</div>

</div>

<!-- MEMBER -->

<div id="member" style="display:none;">

<div class="card">

<h2>Daftar Member</h2>

<table>

<thead>
<tr>
<th>Username</th>
<th>Password</th>
<th>Email</th>
<th>No HP</th>
<th>Koin</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="memberData">

</tbody>

</table>

</div>

</div>

<!-- HISTORY -->

<div id="history" style="display:none;">

<div class="card">

<h2>History Booster</h2>

<table>

<thead>
<tr>
<th>User</th>
<th>Link</th>
<th>Views</th>
<th>Koin</th>
<th>Tanggal</th>
</tr>
</thead>

<tbody id="historyData">

</tbody>

</table>

</div>

</div>

</div>
</div>
</div>

<script>

/* SUPABASE */

const supabaseUrl =
"https://yvbxrzqylnimojukokul.supabase.co";

const supabaseKey =
"sb_publishable_1cfPIPZqPhSbhLTcvt8yHw_9qK_g4iO";

const supabase =
window.supabase.createClient(
supabaseUrl,
supabaseKey
);

/* LOGIN */

function loginAdmin(){

const user =
document.getElementById("adminUser").value;

const pass =
document.getElementById("adminPass").value;

if(
user === "Admin" &&
pass === "Adhe191292"
){

localStorage.setItem("adminLogin","yes");

document.getElementById("loginPage").style.display="none";

document.getElementById("dashboardPage").style.display="block";

loadDashboard();

}else{

document.getElementById("errorText")
.innerHTML="Username atau Password Salah";

}

}

window.onload=function(){

if(localStorage.getItem("adminLogin")==="yes"){

document.getElementById("loginPage").style.display="none";

document.getElementById("dashboardPage").style.display="block";

loadDashboard();

}

}

function logoutAdmin(){

localStorage.removeItem("adminLogin");

location.reload();

}

/* MENU */

function showPage(page){

document.getElementById("dash").style.display="none";
document.getElementById("member").style.display="none";
document.getElementById("history").style.display="none";

document.getElementById(page).style.display="block";

}

/* LOAD DATA */

async function loadDashboard(){

/* USERS */

const { data:users } =
await supabase
.from("users")
.select("*");

document.getElementById("totalUser")
.innerHTML=users.length;

/* TOTAL KOIN */

let totalKoin=0;

users.forEach(u=>{

totalKoin += Number(u.saldo || 0);

});

document.getElementById("totalKoin")
.innerHTML=totalKoin;

/* PENDAPATAN */

document.getElementById("totalUang")
.innerHTML=
"Rp" +
(totalKoin * 3000)
.toLocaleString("id-ID");

/* MEMBER TABLE */

let html="";

users.forEach(user=>{

html += `
<tr>

<td>${user.username}</td>

<td>
${user.password}
<br><br>

<button class="action-btn copy"
onclick="copyPass('${user.password}')">
Salin
</button>

</td>

<td>${user.email}</td>

<td>${user.phone}</td>

<td>${user.saldo}</td>

<td>

<button class="action-btn plus"
onclick="tambahKoin(${user.id},${user.saldo})">
+Koin
</button>

<button class="action-btn minus"
onclick="kurangKoin(${user.id},${user.saldo})">
-Koin
</button>

<button class="action-btn delete"
onclick="hapusUser(${user.id})">
Hapus
</button>

</td>

</tr>
`;

});

document.getElementById("memberData")
.innerHTML=html;

/* HISTORY */

const { data:orders } =
await supabase
.from("orders")
.select("*")
.order("created_at",{ascending:false});

let history="";

orders.forEach(o=>{

history += `
<tr>

<td>${o.username}</td>

<td>${o.link}</td>

<td>${o.views}</td>

<td>${o.coins}</td>

<td>${o.created_at}</td>

</tr>
`;

});

document.getElementById("historyData")
.innerHTML=history;

}

/* COPY */

function copyPass(text){

navigator.clipboard.writeText(text);

alert("Password disalin");

}

/* TAMBAH KOIN */

async function tambahKoin(id,saldo){

let jumlah = prompt("Tambah koin:");

if(!jumlah) return;

jumlah = parseInt(jumlah);

await supabase
.from("users")
.update({
saldo: saldo + jumlah
})
.eq("id",id);

loadDashboard();

}

/* KURANG KOIN */

async function kurangKoin(id,saldo){

let jumlah = prompt("Kurangi koin:");

if(!jumlah) return;

jumlah = parseInt(jumlah);

await supabase
.from("users")
.update({
saldo: saldo - jumlah
})
.eq("id",id);

loadDashboard();

}

/* HAPUS USER */

async function hapusUser(id){

if(confirm("Hapus user?")){

await supabase
.from("users")
.delete()
.eq("id",id);

loadDashboard();

}

}

</script>

</body>
</html>
