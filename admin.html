<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flowbit Admin</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
background:linear-gradient(135deg,#0a0e27,#1a1f3a);
color:white;
overflow-x:hidden;
}

/* LOGIN */

#loginPage{
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(135deg,#0a0e27,#1a1f3a);
}

.login-box{
width:100%;
max-width:420px;
background:rgba(20,24,40,0.95);
padding:40px;
border-radius:20px;
box-shadow:0 20px 60px rgba(99,102,241,0.25);
border:1px solid rgba(99,102,241,0.2);
}

.login-box h1{
text-align:center;
font-size:48px;
margin-bottom:30px;
background:linear-gradient(135deg,#6366f1,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
}

.input{
width:100%;
padding:16px 18px;
margin-bottom:16px;
border:1px solid rgba(99,102,241,0.3);
outline:none;
border-radius:12px;
background:rgba(30,35,60,0.8);
color:white;
font-size:16px;
transition:0.3s;
}

.input:focus{
border-color:#6366f1;
background:rgba(30,35,60,1);
box-shadow:0 0 20px rgba(99,102,241,0.4);
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
color:white;
background:linear-gradient(135deg,#6366f1,#8b5cf6);
transition:0.3s;
margin-top:8px;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 12px 35px rgba(99,102,241,0.4);
}

#error{
text-align:center;
margin-top:16px;
color:#ff6b6b;
font-size:14px;
}

/* DASHBOARD */

#dashboard{
display:none;
}

.topbar{
width:100%;
padding:18px 25px;
font-size:26px;
font-weight:bold;
background:linear-gradient(135deg,#6366f1,#8b5cf6);
position:sticky;
top:0;
z-index:999;
box-shadow:0 8px 25px rgba(99,102,241,0.3);
}

.container{
display:flex;
min-height:calc(100vh - 65px);
}

/* SIDEBAR MODERN */

.sidebar{
width:280px;
background:linear-gradient(180deg,rgba(20,24,40,0.98),rgba(15,20,35,0.98));
min-height:100vh;
padding:25px 0;
border-right:1px solid rgba(99,102,241,0.1);
position:fixed;
left:0;
top:65px;
height:calc(100vh - 65px);
overflow-y:auto;
transition:0.3s;
}

.sidebar-header{
padding:16px 20px;
margin-bottom:15px;
border-bottom:1px solid rgba(99,102,241,0.15);
}

.sidebar-header h3{
font-size:13px;
color:#8b5cf6;
text-transform:uppercase;
letter-spacing:1.2px;
font-weight:700;
}

.sidebar button{
width:calc(100% - 40px);
margin:8px 20px;
padding:14px 16px;
border:none;
border-radius:12px;
background:transparent;
color:#b4a5d6;
font-size:16px;
cursor:pointer;
text-align:left;
display:flex;
align-items:center;
gap:12px;
transition:0.3s;
border-left:3px solid transparent;
}

.sidebar button:hover{
background:rgba(99,102,241,0.15);
color:#c7b8e8;
border-left-color:#6366f1;
transform:translateX(4px);
}

.sidebar button.active{
background:rgba(99,102,241,0.25);
color:#c7b8e8;
border-left-color:#8b5cf6;
}

.sidebar button span{
font-size:20px;
}

.sidebar .logout{
margin-top:30px;
color:#ff6b6b;
border-bottom:1px solid rgba(99,102,241,0.1);
}

.sidebar .logout:hover{
background:rgba(255,107,107,0.1);
border-left-color:#ff6b6b;
}

/* CONTENT */

.content{
flex:1;
padding:30px;
margin-left:280px;
overflow-y:auto;
}

.card{
background:rgba(20,24,40,0.8);
padding:28px;
border-radius:18px;
margin-bottom:28px;
border:1px solid rgba(99,102,241,0.1);
box-shadow:0 8px 25px rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
}

.card h2{
margin-bottom:20px;
color:#8b5cf6;
font-size:24px;
display:flex;
align-items:center;
gap:12px;
}

.stat{
font-size:48px;
font-weight:bold;
color:#6366f1;
margin-top:16px;
}

/* MARKETPLACE SECTION */

.marketplace-grid{
display:grid;
grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
gap:20px;
margin-top:20px;
}

.product-card{
background:rgba(30,35,60,0.8);
border:1px solid rgba(99,102,241,0.2);
border-radius:15px;
padding:20px;
transition:0.3s;
cursor:pointer;
}

.product-card:hover{
transform:translateY(-5px);
border-color:#6366f1;
box-shadow:0 10px 30px rgba(99,102,241,0.2);
}

.product-icon{
font-size:48px;
margin-bottom:15px;
}

.product-name{
font-size:18px;
font-weight:bold;
color:#8b5cf6;
margin-bottom:8px;
}

.product-price{
font-size:16px;
color:#6366f1;
font-weight:600;
margin-bottom:12px;
}

.product-desc{
font-size:13px;
color:#b4a5d6;
margin-bottom:15px;
line-height:1.5;
}

.product-btn{
width:100%;
padding:10px;
background:linear-gradient(135deg,#6366f1,#8b5cf6);
border:none;
border-radius:10px;
color:white;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

.product-btn:hover{
box-shadow:0 8px 20px rgba(99,102,241,0.3);
transform:scale(1.02);
}

.product-btn:active{
transform:scale(0.98);
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:10001;
justify-content:center;
align-items:center;
}

.modal.show{
display:flex;
}

.modal-content{
background:linear-gradient(135deg,rgba(20,24,40,0.98),rgba(15,20,35,0.98));
border:1px solid rgba(99,102,241,0.2);
border-radius:20px;
padding:40px;
max-width:500px;
width:90%;
animation:slideUp 0.3s ease-out;
}

@keyframes slideUp{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.modal-close{
position:absolute;
top:20px;
right:20px;
background:none;
border:none;
color:#8b5cf6;
font-size:28px;
cursor:pointer;
}

.modal-title{
font-size:24px;
color:#8b5cf6;
margin-bottom:15px;
}

.modal-text{
color:#b4a5d6;
margin-bottom:20px;
line-height:1.6;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table th{
background:linear-gradient(135deg,#6366f1,#8b5cf6);
padding:16px;
font-size:15px;
font-weight:600;
}

table td{
background:rgba(30,35,60,0.8);
padding:16px;
text-align:center;
font-size:14px;
border-bottom:1px solid rgba(99,102,241,0.1);
}

table tr:hover td{
background:rgba(99,102,241,0.12);
}

.action{
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
margin:3px;
font-size:13px;
font-weight:600;
transition:0.3s;
}

.plus{
background:#10b981;
}

.plus:hover{
background:#059669;
}

.minus{
background:#f59e0b;
}

.minus:hover{
background:#d97706;
}

.delete{
background:#ef4444;
}

.delete:hover{
background:#dc2626;
}

.copy{
background:#3b82f6;
}

.copy:hover{
background:#2563eb;
}

/* SCROLLBAR */

.sidebar::-webkit-scrollbar{
width:6px;
}

.sidebar::-webkit-scrollbar-track{
background:transparent;
}

.sidebar::-webkit-scrollbar-thumb{
background:rgba(99,102,241,0.3);
border-radius:10px;
}

.sidebar::-webkit-scrollbar-thumb:hover{
background:rgba(99,102,241,0.5);
}

/* RESPONSIVE */

@media(max-width:1024px){

.sidebar{
width:240px;
}

.content{
margin-left:240px;
padding:20px;
}

.card{
padding:20px;
}

.marketplace-grid{
grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
}

}

@media(max-width:768px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
height:auto;
position:relative;
top:0;
border-right:none;
border-bottom:1px solid rgba(99,102,241,0.1);
}

.content{
margin-left:0;
padding:20px;
}

.topbar{
font-size:20px;
padding:15px 20px;
}

.marketplace-grid{
grid-template-columns:repeat(auto-fill, minmax(150px, 1fr));
gap:15px;
}

table{
font-size:12px;
}

table th,
table td{
padding:10px;
}

.action{
padding:6px 10px;
font-size:11px;
}

}

@media(max-width:480px){

.topbar{
font-size:18px;
padding:12px 15px;
}

.sidebar button{
font-size:14px;
padding:12px 14px;
}

.sidebar button span{
font-size:18px;
}

.content{
padding:15px;
}

.card{
padding:15px;
border-radius:12px;
}

.card h2{
font-size:18px;
}

.stat{
font-size:36px;
}

.marketplace-grid{
grid-template-columns:repeat(2, 1fr);
}

.product-card{
padding:15px;
}

.product-icon{
font-size:36px;
}

.product-name{
font-size:15px;
}

.modal-content{
padding:25px;
}

.modal-title{
font-size:20px;
}

table{
font-size:11px;
}

table th,
table td{
padding:8px 5px;
}

}

</style>
</head>
<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="login-box">

<h1>🔐 Admin</h1>

<input type="text" id="username" class="input" placeholder="Username">

<input type="password" id="password" class="input" placeholder="Password">

<button class="btn" onclick="loginAdmin()">
🔑 Login Sekarang
</button>

<div id="error"></div>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div class="topbar">
📊 Flowbit Admin Panel
</div>

<div class="container">

<div class="sidebar">

<div class="sidebar-header">
<h3>📋 Menu</h3>
</div>

<button onclick="showPage('dash')">
<span>📊</span>
Dashboard
</button>

<button onclick="showPage('member')">
<span>👥</span>
Member
</button>

<button onclick="showPage('history')">
<span>📜</span>
History
</button>

<div class="sidebar-header" style="margin-top:20px;">
<h3>🛍️ Penjualan</h3>
</div>

<button onclick="showPage('marketplace')">
<span>🏪</span>
Marketplace
</button>

<div class="sidebar-header" style="margin-top:30px;">
<h3>⚙️ Akun</h3>
</div>

<button class="logout" onclick="logoutAdmin()">
<span>🚪</span>
Logout
</button>

</div>

<div class="content">

<!-- DASHBOARD PAGE -->

<div id="dash">

<div class="card">
<h2>
<span>👥</span>
Total User
</h2>
<div class="stat" id="totalUser">0</div>
</div>

<div class="card">
<h2>
<span>💰</span>
Total Koin
</h2>
<div class="stat" id="totalKoin">0</div>
</div>

<div class="card">
<h2>
<span>💵</span>
Total Pendapatan
</h2>
<div class="stat" id="pendapatan">Rp0</div>
</div>

</div>

<!-- MEMBER PAGE -->

<div id="member" style="display:none;">

<div class="card">

<h2>
<span>👥</span>
Daftar Member
</h2>

<div style="overflow-x:auto;">
<table>

<thead>
<tr>
<th>User</th>
<th>Password</th>
<th>Email</th>
<th>No HP</th>
<th>Koin</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="memberTable"></tbody>

</table>
</div>

</div>

</div>

<!-- HISTORY PAGE -->

<div id="history" style="display:none;">

<div class="card">

<h2>
<span>📜</span>
History Booster
</h2>

<div style="overflow-x:auto;">
<table>

<thead>
<tr>
<th>User</th>
<th>Link</th>
<th>Views</th>
<th>Koin</th>
<th>Status</th>
<th>Tanggal</th>
</tr>
</thead>

<tbody id="historyTable"></tbody>

</table>
</div>

</div>

</div>

<!-- MARKETPLACE PAGE -->

<div id="marketplace" style="display:none;">

<div class="card">

<h2>
<span>🏪</span>
Marketplace Produk Digital
</h2>

<button class="btn" style="margin-top:0;" onclick="openAddProductModal()">
➕ Tambah Produk
</button>

<div class="marketplace-grid" id="productGrid">
</div>

</div>

</div>

</div>

</div>

</div>

<!-- PRODUCT MODAL -->

<div class="modal" id="productModal">
<div class="modal-content">
<button class="modal-close" onclick="closeModal()">✕</button>
<div class="modal-title" id="modalTitle">Detail Produk</div>
<div class="modal-text" id="modalDesc"></div>
</div>
</div>

<!-- ADD PRODUCT MODAL -->

<div class="modal" id="addProductModal">
<div class="modal-content">
<button class="modal-close" onclick="closeAddModal()">✕</button>
<div class="modal-title">Tambah Produk Baru</div>
<input type="text" id="prodName" class="input" placeholder="Nama Produk" style="margin-top:20px;">
<input type="number" id="prodPrice" class="input" placeholder="Harga (Rp)">
<input type="text" id="prodDesc" class="input" placeholder="Deskripsi Singkat">
<input type="text" id="prodIcon" class="input" placeholder="Emoji/Icon">
<button class="btn" onclick="saveProduct()">Simpan Produk</button>
</div>
</div>

<script>

/* SUPABASE */

const { createClient } = supabase;

const supabaseClient = createClient(
"https://yvbxrzqylnimojukokul.supabase.co",
"sb_publishable_1cfPIPZqPhSbhLTcvt8yHw_9qK_g4iO"
);

/* DEFAULT PRODUCTS */

const defaultProducts = [
{
id: 1,
name: "Paket Boost Basic",
price: 50000,
icon: "🚀",
desc: "Boost 1000 views ke product Anda"
},
{
id: 2,
name: "Paket Boost Premium",
price: 150000,
icon: "⭐",
desc: "Boost 5000 views + featured"
},
{
id: 3,
name: "Paket Followers TikTok",
price: 100000,
icon: "🎵",
desc: "Tambah 500 followers TikTok real"
},
{
id: 4,
name: "Paket Likes Instagram",
price: 75000,
icon: "❤️",
desc: "Tambah 1000 likes Instagram"
},
{
id: 5,
name: "Paket View YouTube",
price: 120000,
icon: "📺",
desc: "Boost 2000 views YouTube berkualitas"
},
{
id: 6,
name: "Konsultasi Marketing",
price: 200000,
icon: "📞",
desc: "Konsultasi strategi dengan expert"
}
];

/* LOGIN */

function loginAdmin(){

const user =
document.getElementById("username").value;

const pass =
document.getElementById("password").value;

if(
user === "Admin" &&
pass === "Adhe191292"
){

localStorage.setItem("admin","yes");

document.getElementById("loginPage").style.display="none";

document.getElementById("dashboard").style.display="block";

loadData();

loadMarketplaceProducts();

}else{

document.getElementById("error").innerHTML =
"Username atau Password salah";

}

}

window.onload=function(){

if(localStorage.getItem("admin")==="yes"){

document.getElementById("loginPage").style.display="none";

document.getElementById("dashboard").style.display="block";

loadData();

loadMarketplaceProducts();

}

}

function logoutAdmin(){

localStorage.removeItem("admin");

location.reload();

}

/* MENU */

function showPage(page){

document.getElementById("dash").style.display="none";
document.getElementById("member").style.display="none";
document.getElementById("history").style.display="none";
document.getElementById("marketplace").style.display="none";

document.querySelectorAll(".sidebar button").forEach(btn=>{
btn.classList.remove("active");
});

document.getElementById(page).style.display="block";

event.target.closest("button").classList.add("active");

}

/* LOAD DATA */

async function loadData(){

/* USERS */

const { data:users } =
await supabaseClient
.from("users")
.select("*");

document.getElementById("totalUser")
.innerHTML = users.length;

/* TOTAL KOIN */

let totalKoin = 0;

users.forEach(u=>{

totalKoin += Number(u.saldo || 0);

});

document.getElementById("totalKoin")
.innerHTML = totalKoin;

/* PENDAPATAN */

document.getElementById("pendapatan")
.innerHTML =
"Rp" +
(totalKoin * 3000)
.toLocaleString("id-ID");

/* MEMBER TABLE */

let html="";

users.forEach(user=>{

html += `
<tr>

<td>${user.username}</td>

<td>
${user.password}
<br><br>

<button class="action copy"
onclick="copyPass('${user.password}')">
Salin
</button>

</td>

<td>${user.email}</td>

<td>${user.phone}</td>

<td>${user.saldo}</td>

<td>

<button class="action plus"
onclick="tambahKoin(${user.id},${user.saldo})">
+Koin
</button>

<button class="action minus"
onclick="kurangKoin(${user.id},${user.saldo})">
-Koin
</button>

<button class="action delete"
onclick="hapusUser(${user.id})">
Hapus
</button>

</td>

</tr>
`;

});

document.getElementById("memberTable")
.innerHTML = html;

/* HISTORY */

const { data:orders } =
await supabaseClient
.from("orders")
.select("*")
.order("created_at",{ascending:false});

let history="";

orders.forEach(o=>{

history += `
<tr>

<td>${o.username}</td>

<td>${o.link}</td>

<td>${o.views}</td>

<td>${o.coins}</td>

<td>${o.status}</td>

<td>${new Date(o.created_at).toLocaleDateString('id-ID')}</td>

</tr>
`;

});

document.getElementById("historyTable")
.innerHTML = history;

}

/* MARKETPLACE */

function loadMarketplaceProducts(){

const productGrid = document.getElementById("productGrid");

productGrid.innerHTML = "";

defaultProducts.forEach(product => {

const card = document.createElement("div");

card.className = "product-card";

card.onclick = () => openProductModal(product);

card.innerHTML = `
<div class="product-icon">${product.icon}</div>
<div class="product-name">${product.name}</div>
<div class="product-price">Rp${product.price.toLocaleString('id-ID')}</div>
<div class="product-desc">${product.desc}</div>
<button class="product-btn">Lihat Detail</button>
`;

productGrid.appendChild(card);

});

}

function openProductModal(product){

document.getElementById("modalTitle").innerHTML = product.name;

document.getElementById("modalDesc").innerHTML = `
<p><strong>Harga:</strong> Rp${product.price.toLocaleString('id-ID')}</p>
<p><strong>Deskripsi:</strong> ${product.desc}</p>
<p style="margin-top:20px; font-size:12px; color:#888;">
Produk ini akan ditampilkan di marketplace untuk dijual kepada member.
</p>
`;

document.getElementById("productModal").classList.add("show");

}

function closeModal(){

document.getElementById("productModal").classList.remove("show");

}

function openAddProductModal(){

document.getElementById("addProductModal").classList.add("show");

}

function closeAddModal(){

document.getElementById("addProductModal").classList.remove("show");

}

function saveProduct(){

const name = document.getElementById("prodName").value;

const price = document.getElementById("prodPrice").value;

const desc = document.getElementById("prodDesc").value;

const icon = document.getElementById("prodIcon").value;

if(!name || !price || !desc || !icon){

alert("Lengkapi semua field");

return;

}

defaultProducts.push({

id: defaultProducts.length + 1,

name: name,

price: parseInt(price),

desc: desc,

icon: icon

});

loadMarketplaceProducts();

closeAddModal();

document.getElementById("prodName").value = "";

document.getElementById("prodPrice").value = "";

document.getElementById("prodDesc").value = "";

document.getElementById("prodIcon").value = "";

alert("Produk berhasil ditambahkan!");

}

/* COPY PASSWORD */

function copyPass(text){

navigator.clipboard.writeText(text);

alert("Password disalin");

}

/* TAMBAH KOIN */

async function tambahKoin(id,saldo){

let jumlah = prompt("Tambah koin:");

if(!jumlah) return;

jumlah = parseInt(jumlah);

await supabaseClient
.from("users")
.update({
saldo: saldo + jumlah
})
.eq("id",id);

loadData();

}

/* KURANG KOIN */

async function kurangKoin(id,saldo){

let jumlah = prompt("Kurangi koin:");

if(!jumlah) return;

jumlah = parseInt(jumlah);

await supabaseClient
.from("users")
.update({
saldo: saldo - jumlah
})
.eq("id",id);

loadData();

}

/* HAPUS USER */

async function hapusUser(id){

if(confirm("Hapus user?")){

await supabaseClient
.from("users")
.delete()
.eq("id",id);

loadData();

}

}

</script>

</body>
</html>
